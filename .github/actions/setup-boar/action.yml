name: Setup Boar environment
description: Common setup steps for Boar CI jobs (Python, venv, deps, optional cdedup build)
inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.11"
  build-dedup:
    description: Build the cdedup extension (compiles sqlite amalgamation as part of build)
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt', 'setup.py', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ inputs.python-version }}-

    - name: Restore cdedup build artifacts
      if: ${{ inputs.build-dedup == 'true' }}
      id: cdedup-cache
      uses: actions/cache/restore@v4
      with:
        path: |
          cdedup/sqlite3.c
          cdedup/sqlite3.h
          cdedup/sqlite3.o
          cdedup/cdedup*.so
          cdedup/build
          cdedup.so
        key: ${{ runner.os }}-cdedup-${{ inputs.python-version }}-${{ hashFiles('cdedup/Makefile', 'cdedup/setup-cython.py', 'cdedup/*.c', 'cdedup/*.h', 'cdedup/*.pyx') }}
        restore-keys: |
          ${{ runner.os }}-cdedup-${{ inputs.python-version }}-

    - name: Install build dependencies (for cdedup)
      if: ${{ runner.os == 'Linux' && inputs.build-dedup == 'true' && steps.cdedup-cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget unzip

    - name: Set up virtualenv (with cython)
      if: ${{ inputs.build-dedup == 'true' }}
      shell: bash
      env:
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      run: |
        set -euo pipefail
        python -m venv .venv
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          VENV_PY=".venv/Scripts/python"
        else
          VENV_PY=".venv/bin/python"
        fi
        "$VENV_PY" -V
        # Always invoke pip via the venv's python to avoid replacing pip.exe while running (Windows)
        "$VENV_PY" -m pip install -U pip
        "$VENV_PY" -m pip install -r requirements.txt
        "$VENV_PY" -m pip install cython

    - name: Set up virtualenv (no cython)
      if: ${{ inputs.build-dedup != 'true' }}
      shell: bash
      env:
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      run: |
        set -euo pipefail
        python -m venv .venv
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          VENV_PY=".venv/Scripts/python"
        else
          VENV_PY=".venv/bin/python"
        fi
        "$VENV_PY" -V
        "$VENV_PY" -m pip install -U pip
        "$VENV_PY" -m pip install -r requirements.txt

    - name: Build dedup extension (cdedup.so)
      if: ${{ inputs.build-dedup == 'true' && steps.cdedup-cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          VENV_PY=".venv/Scripts/python"
        else
          VENV_PY=".venv/bin/python"
        fi
        make -C cdedup PYTHON="$VENV_PY"
        test -e cdedup.so

    - name: Validate cached dedup extension
      if: ${{ inputs.build-dedup == 'true' }}
      shell: bash
      run: |
        test -e cdedup.so

    - name: Save cdedup build artifacts
      if: ${{ inputs.build-dedup == 'true' && steps.cdedup-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: |
          cdedup/sqlite3.c
          cdedup/sqlite3.h
          cdedup/sqlite3.o
          cdedup/cdedup*.so
          cdedup/build
          cdedup.so
        key: ${{ steps.cdedup-cache.outputs.cache-primary-key }}
