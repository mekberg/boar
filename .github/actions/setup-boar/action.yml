name: Setup Boar environment
description: Common setup steps for Boar CI jobs (Python, venv, deps, optional rdedup build)
inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.11"
  build-dedup:
    description: Build the rdedup extension (the Rust/PyO3 deduplication module)
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt', 'setup.py', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ inputs.python-version }}-

    - name: Set up Rust
      if: ${{ inputs.build-dedup == 'true' }}
      uses: dtolnay/rust-toolchain@stable

    # NB: no shared cargo build cache here. The matrix builds rdedup once per
    # Python version, and a cache key that does not distinguish the version
    # would let one version's compiled artifact be reused by another job,
    # which flaked across the matrix. The build is fast enough to repeat.

    - name: Set up virtualenv
      shell: bash
      env:
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      run: |
        set -euo pipefail
        python -m venv .venv
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          VENV_PY=".venv/Scripts/python"
        else
          VENV_PY=".venv/bin/python"
        fi
        "$VENV_PY" -V
        # Always invoke pip via the venv's python to avoid replacing pip.exe while running (Windows)
        "$VENV_PY" -m pip install -U pip
        "$VENV_PY" -m pip install -r requirements.txt

    - name: Build dedup extension (rdedup.so)
      if: ${{ inputs.build-dedup == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          VENV_PY="$PWD/.venv/Scripts/python"
        else
          VENV_PY="$PWD/.venv/bin/python"
        fi
        # abi3 (see rdedup/Cargo.toml) makes one compiled module work on any
        # supported CPython; PYO3_PYTHON points the build at this job's venv.
        make -C rdedup PYTHON="$VENV_PY"
        test -e rdedup.so
