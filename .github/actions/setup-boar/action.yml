name: Setup Boar environment
description: Common setup steps for Boar CI jobs (Python, venv, deps, cdedup build)
inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.11"
runs:
  using: "composite"
  steps:
    - name: Set up Python
    
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget unzip

    - name: Set up virtualenv
      shell: bash
      run: |
        python -m venv .venv
        source .venv/bin/activate
        python -V
        pip install -U pip pytest cython

    - name: Build dedup extension (cdedup.so)
      shell: bash
      run: |
        set -euo pipefail
        source .venv/bin/activate
        make -C cdedup PYTHON="$(which python)"
        test -e cdedup.so
