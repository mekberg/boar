name: Setup Boar environment
description: Common setup steps for Boar CI jobs (Python, venv, deps, optional cdedup build)
inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.11"
  build-dedup:
    description: Build the cdedup extension (compiles sqlite amalgamation as part of build)
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt', 'setup.py', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ inputs.python-version }}-

    - name: Install build dependencies (for cdedup)
      if: ${{ inputs.build-dedup == 'true' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget unzip

    - name: Cache cdedup build artifacts
      if: ${{ inputs.build-dedup == 'true' }}
      id: cdedup-cache
      uses: actions/cache@v4
      with:
        path: |
          cdedup/sqlite3.c
          cdedup/sqlite3.h
          cdedup/sqlite3.o
          cdedup/cdedup*.so
          cdedup/build
          cdedup.so
        key: ${{ runner.os }}-cdedup-${{ inputs.python-version }}-${{ hashFiles('cdedup/Makefile', 'cdedup/setup-cython.py', 'cdedup/*.c', 'cdedup/*.h', 'cdedup/*.pyx') }}
        restore-keys: |
          ${{ runner.os }}-cdedup-${{ inputs.python-version }}-

    - name: Set up virtualenv (with cython)
      if: ${{ inputs.build-dedup == 'true' }}
      shell: bash
      run: |
        python -m venv .venv
        source .venv/bin/activate
        python -V
        pip install -U pip
        pip install -r requirements.txt
        pip install cython

    - name: Set up virtualenv (no cython)
      if: ${{ inputs.build-dedup != 'true' }}
      shell: bash
      run: |
        python -m venv .venv
        source .venv/bin/activate
        python -V
        pip install -U pip
        pip install -r requirements.txt

    - name: Build dedup extension (cdedup.so)
      if: ${{ inputs.build-dedup == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        source .venv/bin/activate
        if [ -f cdedup.so ]; then
          echo "Using cached cdedup.so"
        else
          make -C cdedup PYTHON="$(which python)"
        fi
        test -e cdedup.so
