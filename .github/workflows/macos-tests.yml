name: macOS tests (manual)

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        default: "3.12"

jobs:
  tests:
    name: Run unit + local macrotests on macOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          check-latest: true

      - name: Install GNU coreutils (mktemp, md5sum, etc.)
        run: |
          brew update
          brew install coreutils

      - name: Add GNU coreutils to PATH
        run: echo "$(brew --prefix coreutils)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure pytest is available for any direct invocation inside tests
          pip install pytest

      - name: Run tests (no dedup extension)
        env:
          # Make test output less noisy in CI
          BOAR_HIDE_PROGRESS: "1"
        run: |
          source .venv/bin/activate
          # Prefer the script that skips the optional C dedup extension and only runs local macrotests
          bash ./run_tests_nodedup.sh
