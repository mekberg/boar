name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests-nodedup:
    name: Unit tests (no dedup)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: &py_versions ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Boar environment (no dedup)
        uses: ./.github/actions/setup-boar
        with:
          build-dedup: "false"
          python-version: ${{ matrix.python-version }}

      - name: Assert dedup module is not present
        shell: bash
        run: |
          test ! -e cdedup.so

      - name: Run unit tests (no dedup)
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          export BOAR_SERVER_CLI="$PWD/boar"
          export BOAR_CACHEDIR="$(mktemp --tmpdir=/tmp/ -d 'boar_tests_cache_XXXXX')"
          for unittest in tests/test_*.py blobrepo/tests/test_*.py; do
            echo "Executing $unittest (cachedir $BOAR_CACHEDIR)"
            BOAR_SKIP_DEDUP_TESTS=1 BOAR_TEST_REMOTE_REPO=0 python "$unittest"
          done
          rm -rf "$BOAR_CACHEDIR"

  unit-tests-nodedup-windows:
    name: Unit tests (Windows, no dedup)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: *py_versions
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', 'setup.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -V
          pip install -U pip
          pip install -r requirements.txt

      - name: Run unit tests (no dedup)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\.venv\Scripts\Activate.ps1
          $env:BOAR_SERVER_CLI = "${PWD}\boar"
          $cacheDir = Join-Path -Path ([System.IO.Path]::GetTempPath()) -ChildPath ("boar_tests_cache_{0}" -f ([System.Guid]::NewGuid().ToString('N')))
          New-Item -ItemType Directory -Path $cacheDir | Out-Null
          $env:BOAR_CACHEDIR = $cacheDir
          $testFiles = @()
          $testFiles += Get-ChildItem -Path tests -Filter 'test_*.py' | Select-Object -ExpandProperty FullName
          $testFiles += Get-ChildItem -Path blobrepo\tests -Filter 'test_*.py' | Select-Object -ExpandProperty FullName
          try {
            foreach ($test in $testFiles) {
              Write-Host "Executing $test (cachedir $cacheDir)"
              $env:BOAR_SKIP_DEDUP_TESTS = '1'
              $env:BOAR_TEST_REMOTE_REPO = '0'
              python $test
              if ($LASTEXITCODE -ne 0) {
                throw "Test $test failed with exit code $LASTEXITCODE"
              }
            }
          }
          finally {
            Remove-Item -LiteralPath $cacheDir -Recurse -Force -ErrorAction SilentlyContinue
          }

  unit-tests:
    name: Unit tests (with dedup)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: *py_versions
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Boar environment
        uses: ./.github/actions/setup-boar
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          export BOAR_SERVER_CLI="$PWD/boar"
          export BOAR_CACHEDIR="$(mktemp --tmpdir=/tmp/ -d 'boar_tests_cache_XXXXX')"
          for unittest in tests/test_*.py blobrepo/tests/test_*.py; do
            echo "Executing $unittest (cachedir $BOAR_CACHEDIR)"
            BOAR_TEST_REMOTE_REPO=0 python "$unittest"
          done
          rm -rf "$BOAR_CACHEDIR"

  macro-tests-local:
    name: Macro tests (local)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: *py_versions
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Boar environment
        uses: ./.github/actions/setup-boar
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run macro tests (local)
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          export BOAR_SERVER_CLI="$PWD/boar"
          echo "Executing local macro tests"
          BOAR_TEST_REMOTE_REPO=0 bash macrotests/macrotest.sh

  macro-tests-simulated-remote:
    name: Macro tests (simulated remote)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: *py_versions
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Boar environment
        uses: ./.github/actions/setup-boar
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run macro tests (simulated remote)
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          export BOAR_SERVER_CLI="$PWD/boar"
          echo "Executing simulated remote macro tests"
          BOAR_TEST_REMOTE_REPO=1 bash macrotests/macrotest.sh
