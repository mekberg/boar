name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests-nodedup:
    name: Unit tests (no dedup)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Boar environment (no dedup)
        uses: ./.github/actions/setup-boar
        with:
          build-dedup: "false"
          python-version: ${{ matrix.python-version }}

      - name: Assert dedup module is not present
        shell: bash
        run: |
          test ! -e cdedup.so

      - name: Run unit tests (no dedup)
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          export BOAR_SERVER_CLI="$PWD/boar"
          export BOAR_CACHEDIR="$(mktemp --tmpdir=/tmp/ -d 'boar_tests_cache_XXXXX')"
          for unittest in tests/test_*.py blobrepo/tests/test_*.py; do
            echo "Executing $unittest (cachedir $BOAR_CACHEDIR)"
            BOAR_SKIP_DEDUP_TESTS=1 BOAR_TEST_REMOTE_REPO=0 python "$unittest"
          done
          rm -rf "$BOAR_CACHEDIR"

  unit-tests:
    name: Unit tests (with dedup)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Boar environment
        uses: ./.github/actions/setup-boar
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          export BOAR_SERVER_CLI="$PWD/boar"
          export BOAR_CACHEDIR="$(mktemp --tmpdir=/tmp/ -d 'boar_tests_cache_XXXXX')"
          for unittest in tests/test_*.py blobrepo/tests/test_*.py; do
            echo "Executing $unittest (cachedir $BOAR_CACHEDIR)"
            BOAR_TEST_REMOTE_REPO=0 python "$unittest"
          done
          rm -rf "$BOAR_CACHEDIR"

  macro-tests-local:
    name: Macro tests (local)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Boar environment
        uses: ./.github/actions/setup-boar
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run macro tests (local)
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          export BOAR_SERVER_CLI="$PWD/boar"
          echo "Executing local macro tests"
          BOAR_TEST_REMOTE_REPO=0 bash macrotests/macrotest.sh

  macro-tests-simulated-remote:
    name: Macro tests (simulated remote)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Boar environment
        uses: ./.github/actions/setup-boar
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run macro tests (simulated remote)
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          export BOAR_SERVER_CLI="$PWD/boar"
          echo "Executing simulated remote macro tests"
          BOAR_TEST_REMOTE_REPO=1 bash macrotests/macrotest.sh
