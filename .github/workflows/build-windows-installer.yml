name: Build Windows Installer

on:
  push:
    branches: [ boar-py3-devel, main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version to build with'
        required: false
        default: '3.11'

jobs:
  windows:
    name: Build boar.exe and Installer (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python-version || '3.11' }}
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build boar.exe with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --name boar --onefile boar
          Get-ChildItem dist | Format-Table -AutoSize

      - name: Smoke test boar.exe
        run: |
          .\dist\boar.exe --version

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y || choco upgrade innosetup --no-progress -y

      - name: Build installer with Inno Setup
        run: |
          $iscc = $null
          $cmd = Get-Command iscc.exe -ErrorAction SilentlyContinue
          if ($cmd) { $iscc = $cmd.Source }
          if (-not $iscc) {
            $candidates = @(
              "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
              "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
              "C:\\ProgramData\\chocolatey\\lib\\innosetup\\tools\\ISCC.exe"
            )
            foreach ($p in $candidates) { if (Test-Path $p) { $iscc = $p; break } }
          }
          if (-not $iscc -or -not (Test-Path $iscc)) {
            Write-Host "ISCC.exe not found in common locations."
            Write-Host "Checked: $($candidates -join ', ')"
            throw "ISCC.exe not found"
          }
          Write-Host "Using ISCC: $iscc"
          & $iscc "innosetup\innosetup.iss"

      - name: Upload boar.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: boar-windows-exe
          path: dist/boar.exe

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: boar-windows-installer
          path: boar-setup-win32.exe

      - name: Workflow summary
        if: always()
        run: |
          if (Test-Path dist/boar.exe) {
            $exe = Resolve-Path dist/boar.exe
            "Built executable: $exe" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          } else {
            "Executable not found (dist/boar.exe)." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }
          if (Test-Path boar-setup-win32.exe) {
            $installer = Resolve-Path boar-setup-win32.exe
            "Built installer:  $installer" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          } else {
            "Installer not found (boar-setup-win32.exe)." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }
